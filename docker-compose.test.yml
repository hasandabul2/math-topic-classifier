# ──────────────────────────────────────────────────────────────────────────
# Docker Compose — Integration Test Stack
# ──────────────────────────────────────────────────────────────────────────
# Spins up PostgreSQL, FastAPI backend, and React frontend containers
# for end-to-end integration testing.
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d --build
#   pytest tests/integration/ -v
#   docker-compose -f docker-compose.test.yml down -v
# ──────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: math_classifier_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d math_classifier_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://test_user:test_password@db:5432/math_classifier_test
      ENDPOINT_URL: ""
      HF_TOKEN: ""
      GOOGLE_CLIENT_ID: "test-client-id"
      GOOGLE_CLIENT_SECRET: "test-secret"
      IYZICO_API_KEY: ""
      IYZICO_SECRET_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      start_period: 15s
      retries: 5

  # ── React Frontend (Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata_test:
